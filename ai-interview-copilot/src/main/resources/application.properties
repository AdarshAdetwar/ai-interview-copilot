# ==============================
# APP
# ==============================
spring.application.name=ai-interview-copilot


# ==============================
# DATABASE (MongoDB)
# ==============================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/aiInterviewDB}


# ==============================
# SECURITY (JWT)
# ==============================
jwt.secret=${JWT_SECRET}


# ==============================
# OPENROUTER API
# ==============================
openrouter.api.key=${OPENROUTER_API_KEY}
app.openrouter.referer=${APP_OPENROUTER_REFERER:http://localhost:8080}


# ==============================
# RAG SERVICE
# ==============================
rag.service.url=https://rag-service-d635.onrender.com


# ==============================
# SERVER PORT (🔥 IMPORTANT FIX)
# ==============================
server.port=${PORT:8080}


# ==============================
# FILE UPLOAD LIMITS
# ==============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


# ==============================
# CORS
# ==============================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}


# ==============================
# LOGGING
# ==============================
logging.level.root=WARN


# ==============================
# ACTUATOR (🔥 REQUIRED)
# ==============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always