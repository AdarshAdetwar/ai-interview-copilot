spring.application.name=ai-interview-copilot

# MongoDB — from environment variable
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/aiInterviewDB}

# JWT Secret
jwt.secret=${JWT_SECRET}

# OpenRouter AI API
openrouter.api.key=${OPENROUTER_API_KEY}

# RAG Service (FastAPI) - VERY IMPORTANT
rag.service.url=https://rag-service-d635.onrender.com

# OpenRouter Referer Header
app.openrouter.referer=${APP_OPENROUTER_REFERER:http://localhost:9090}

server.port=9090

# File Upload Limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.root=WARN

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always